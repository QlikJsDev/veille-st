name: Génération & Déploiement GitHub Pages

on:
  schedule:
    - cron: "0 */4 * * *"   # toutes les 4 heures
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write    # pour commiter costs.json
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install feedparser requests anthropic

      - name: Générer articles.json + costs.json
        run: python generate_static.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commiter costs.json (historique persistant)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/costs.json docs/score_cache.json
          git diff --staged --quiet || git commit -m "chore: update costs + score cache [skip ci]"
          git push
        continue-on-error: true   # ne pas bloquer si rien à commiter

      - name: Upload artifact GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
